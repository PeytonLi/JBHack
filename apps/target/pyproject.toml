[project]
name = "autoscribe-target"
version = "0.1.0"
description = "Broken e-commerce service — the target Auto-Scribe debugs"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "supabase>=2.10.0",
    "sentry-sdk>=2.19.0",
    "pydantic>=2.10.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
